name: Trading Bot Runner
on:
  schedule:
    - cron: '35 14 * * *' # ירוץ כל יום ב-16:35
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install yfinance pandas requests
      - run: python bot.py
